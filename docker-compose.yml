version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: gestion-chantier-db

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d/schema
      - ./database/data:/docker-entrypoint-initdb.d/data

    networks:
      - chantier-network

volumes:
  postgres_data:

networks:
  chantier-network:
    driver: bridge
